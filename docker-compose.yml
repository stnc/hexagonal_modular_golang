services:

  postgres:
    container_name: postgres_hexago
    image: postgres:14.1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
      POSTGRES_HOST_AUTH_METHOD: "trust"
      PGDATA: /data/postgres

    volumes:
       - postgres:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - backend
    restart: unless-stopped
  
  pgadmin:
    container_name: pgadmin_hexago
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      
    volumes:
       - pgadmin:/var/lib/pgadmin

    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - backend
    restart: unless-stopped

  # Redis Service   
  redis:
    image: "redis:alpine" # Use a public Redis image to build the redis service    
    restart: unless-stopped
    container_name: redis_hexago
    networks:
      - backend

  redis-commander:
    container_name: redis-commander_hexago
    hostname: redis-commander
    image: rediscommander/redis-commander
    restart: always
    environment:
    - REDIS_HOSTS=local:redis:6379
    ports:
    - "8081:8081"
    networks:
      - backend

    # adminer Service   
  adminer:
    image: adminer
    restart: always
    container_name: adminer_hexago
    ports:
    - "8282:8282"
    command:
    - 'php'
    - '-S'
    - '[::]:8282'
    - '-t'
    - '/var/www/html'
    entrypoint:
    - 'entrypoint.sh'
    - 'docker-php-entrypoint'
    networks:
      - backend    

  mongo:
    image: mongo:7
    container_name: mongo_hexago
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - backend    


networks:
  backend:
    driver: bridge

volumes:
    postgres:
    pgadmin:
    golang:
    mongodata: