services:

  postgres:
    container_name: postgres_hexago
    image: postgres:14.1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
      POSTGRES_HOST_AUTH_METHOD: "trust"
      PGDATA: /data/postgres

    volumes:
       - postgres:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - backend
    restart: unless-stopped
  
  pgadmin:
    container_name: pgadmin_hexago
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      
    volumes:
       - pgadmin:/var/lib/pgadmin

    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - backend
    restart: unless-stopped

  # # Redis Service   
  redis:
    image: redis:6.2-alpine
    restart: unless-stopped
    container_name: redis_hexago
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --requirepass MDNcVb924a --loglevel warning
    networks:
      - backend


  redis-commander:
    container_name: redis-commander_hexago
    hostname: redis-commander
    image: rediscommander/redis-commander:latest
    environment:
    - REDIS_HOST=redis
    - REDIS_PASSWORD=MDNcVb924a
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis
    restart:
      unless-stopped
    networks:
      - backend


      
    # adminer Service   
  adminer:
    image: adminer
    restart: always
    container_name: adminer_hexago
    ports:
    - "8282:8282"
    command:
    - 'php'
    - '-S'
    - '[::]:8282'
    - '-t'
    - '/var/www/html'
    entrypoint:
    - 'entrypoint.sh'
    - 'docker-php-entrypoint'
    networks:
      - backend    

  mongo:
    image: mongo:7
    container_name: mongo_hexago
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: examplepassword
    ports:
    - "27017:27017"
    volumes:
        - mongo_data:/data/db
    networks:
        - backend


  mongo-express:
    image: mongo-express
    container_name: mongo-express_hexago
    depends_on:
      - mongo
    ports:
      - "3000:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://root:examplepassword@mongo:27017/admin"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    networks:
        - backend


networks:
  backend:
    driver: bridge

volumes:
    postgres:
    pgadmin:
    golang:
    mongo_data: