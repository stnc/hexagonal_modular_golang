# air.toml
root = "."
tmp_dir = "tmp"

env_files = [".env"]

[build]
pre_cmd = []
cmd = "go build -o ./tmp/all ./cmd "
post_cmd = []

bin = "tmp/all"
entrypoint = ["./tmp/all"]

include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor","public", "views", "node_modules","frontend/node_modules"]
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = true

delay = 200
stop_on_error = true
send_interrupt = true
kill_delay = 500
follow_symlink = true
poll = false

[build.windows]
cmd = "go build -o ./tmp/all.exe ./cmd/all"

bin = "tmp\\all.exe"
entrypoint = ["tmp\\all.exe"]

[build.darwin]
cmd = "go build -o ./tmp/all ./cmd/all"
bin = "tmp/all"
entrypoint = ["./tmp/all"]

# cmd = "go build -o ./tmp/api.exe ./cmd/api --APP=all"
# cmd = "CONFIG_FILE=config.dev.json go run main.go"

[log]
time = false
main_only = false
silent = false

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = true
keep_scroll = true

[proxy]
enabled = true
proxy_port = 8090
app_port = 8080
app_start_timeout = 5000